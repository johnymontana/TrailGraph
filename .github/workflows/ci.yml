name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Build/test-only placeholders (no real secrets needed for the test suite).
  BETTER_AUTH_SECRET: ci-test-secret-0000000000000000000000
  BETTER_AUTH_URL: http://localhost:3000

jobs:
  unit:
    name: Lint · Typecheck · Unit · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with: { version: 10 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm build

  integration:
    name: Integration (Neo4j)
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.26-community
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports: ['7687:7687', '7474:7474']
        options: >-
          --health-cmd "wget -q -O /dev/null http://localhost:7474 || exit 1"
          --health-interval 10s --health-timeout 5s --health-retries 20
    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: testpassword
      NEO4J_DATABASE: neo4j
      RUN_INTEGRATION: '1'
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with: { version: 10 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Apply schema
        run: pnpm db:migrate
      - name: Integration tests
        run: pnpm test:integration

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.26-community
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports: ['7687:7687', '7474:7474']
        options: >-
          --health-cmd "wget -q -O /dev/null http://localhost:7474 || exit 1"
          --health-interval 10s --health-timeout 5s --health-retries 20
    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: testpassword
      NEO4J_DATABASE: neo4j
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with: { version: 10 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Apply schema + seed fixtures
        run: |
          pnpm db:migrate
          pnpm seed:test
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: E2E tests
        run: pnpm test:e2e
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  evals:
    name: Agent evals (opt-in)
    # Evals run the real agent → need AI Gateway creds + seeded data. Opt in by setting the repo
    # variable RUN_EVALS=true and the AI_GATEWAY_API_KEY secret; default CI stays green without them.
    if: ${{ vars.RUN_EVALS == 'true' }}
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.26-community
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports: ['7687:7687', '7474:7474']
        options: >-
          --health-cmd "wget -q -O /dev/null http://localhost:7474 || exit 1"
          --health-interval 10s --health-timeout 5s --health-retries 20
    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: testpassword
      NEO4J_DATABASE: neo4j
      AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with: { version: 10 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate && pnpm seed:test
      - run: pnpm agent:eval
